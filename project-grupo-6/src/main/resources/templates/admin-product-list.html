<!DOCTYPE html>
<html lang="en">
<head>
    <title>Products Management - Crossfire Shop</title>
    </head>

<body class="d-flex flex-column min-vh-100">
    {{>header}}

    <section class="container py-5 flex-grow-1">
        <div class="row">
            {{>sidebar}}

            <main class="col-12 col-md-8">
                <div class="row">
                    {{#products}}
                    <div class="col-12">
                        <div class="card mb-3 rounded-0">
                            <div class="row g-0 align-items-center">
                                <div class="col-md-2 text-center">
                                    <img src="{{mainImage}}" 
                                        class="img-fluid rounded-circle p-3" 
                                        alt="{{name}}"
                                        onerror="this.src='/css/img/default-product.png'">
                                </div>

                                <div class="col-md-7">
                                    <div class="card-body">
                                        <h5 class="card-title mb-1">{{name}}</h5>
                                        <p class="card-text mb-1">
                                            <small class="text-muted">{{price}}€</small>
                                        </p>
                                    </div>
                                </div>

                                <div class="col-md-3">
                                    <div class="card-body d-flex flex-column gap-2">

                                        <a href="/admin/products/{{id}}" class="btn btn-outline-success btn-sm mt-2">
                                            <i class="fas fa-eye"></i> View
                                        </a>

                                        <a href="/admin/products/{{id}}/edit" class="btn btn-outline-primary btn-sm">
                                            <i class="fas fa-edit"></i> Manage
                                        </a>
                                        
                                        <form action="/admin/products/{{id}}/delete" method="post" onsubmit="return confirm('Delete this product?');">
                                            <input type="hidden" name="_csrf" value="{{token}}"/>
                                            <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                                                <i class="fas fa-trash"></i> Delete
                                            </button>
                                        </form>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                    {{/products}}
                    
                    {{^products}}
                    <div class="col-12 text-center py-5">
                        <div class="alert alert-light border">
                            <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
                            <p class="text-muted mb-0">No products found. Start by creating one!</p>
                        </div>
                    </div>
                    {{/products}}
                </div>

                <div class="d-flex justify-content-end mb-3 mt-3">
                    <a href="/product/add" class="btn btn-success">
                        <i class="fas fa-plus me-2"></i> Create product
                    </a>
                </div>
            </main>
        </div>
    </section>

    {{>footer}}
</body>
</html>
