<body>
    {{>header}}

    <section class="container py-5">
        <div class="row">
            <aside class="col-12 col-md-4 mb-4">
                <div class="card mb-4 mt-3">
                    <div class="card-body">
                        <h5 class="card-title">Account</h5>
                        <div class="list-group list-group-flush">
                            <a href="/user/profile" class="list-group-item list-group-item-action d-flex align-items-center">
                                <i class="fas fa-user me-3"></i>
                                <span>Profile</span>
                            </a>
                            <a href="/user/orders" class="list-group-item list-group-item-action d-flex align-items-center">
                                <i class="fas fa-history me-3 "></i>
                                <span>Purchase History</span>
                            </a>
                            <a href="/user/user-form" class="list-group-item list-group-item-action d-flex align-items-center">
                                <i class="fas fa-user-cog me-3"></i>
                                <span>Change Data</span>
                            </a>
                        </div>
                    </div>
                </div>

                {{#isAdmin}}
                <div class="card mb-4 mt-3">
                    <div class="card-body">
                        <h5 class="card-title text-danger">Admin Panel</h5>
                        <div class="list-group list-group-flush">
                            <a href="/admin/users" class="list-group-item list-group-item-action d-flex align-items-center">
                                <i class="fas fa-users me-3 text-danger"></i>
                                <span>Users List</span>
                            </a>
                            <a href="/admin/products" class="list-group-item list-group-item-action d-flex align-items-center">
                                <i class="fas fa-box-open me-3 text-danger"></i>
                                <span>Products Management</span>
                            </a>
                        </div>
                    </div>
                </div>
                {{/isAdmin}}

                <div class="col d-grid">
                    <form action="/user/delete" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-lg">
                            Delete profile
                        </button>
                    </form>
                </div>

                <div class="col d-grid mt-3">
                    <a href="/user/logout" class="btn btn-outline-danger btn-lg">
                        Log out
                    </a>
                </div>
            </aside>

            <main class="col-12 col-md-8">
                <div class="row">
                    {{#products}}
                    <div class="col-12">
                        <div class="card mb-3 rounded-0">
                            <div class="row g-0 align-items-center">
                                <div class="col-md-2 text-center">
                                    <img src="{{images.0}}" 
                                         class="img-fluid rounded-circle p-3" 
                                         alt="{{name}}"
                                         onerror="this.src='/css/img/default-product.png'">
                                </div>

                                <div class="col-md-7">
                                    <div class="card-body">
                                        <h5 class="card-title mb-1">{{name}}</h5>
                                        <p class="card-text mb-1">
                                            <small class="text-muted">{{price}}€</small>
                                        </p>
                                    </div>
                                </div>

                                <div class="col-md-3">
                                    <div class="card-body d-flex flex-column gap-2">
                                        <a href="/product/{{id}}" class="btn btn-outline-success btn-sm">
                                            <i class="far fa-eye"></i> View
                                        </a>
                                        <a href="/product/edit/{{id}}" class="btn btn-outline-primary btn-sm">
                                            <i class="fas fa-edit"></i> Edit
                                        </a>
                                        <form action="/product/delete/{{id}}" method="post" onsubmit="return confirm('Delete this product?');">
                                            <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                                                <i class="fas fa-trash"></i> Delete
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    {{/products}}
                    
                    {{^products}}
                    <div class="col-12 text-center py-5">
                        <p class="text-muted">No products found. Start by creating one!</p>
                    </div>
                    {{/products}}
                </div>

                <div class="d-flex justify-content-end mb-3">
                    <a href="/product/add" class="btn btn-success">
                        <i class="fas fa-plus me-1"></i> Create product
                    </a>
                </div>
            </main>
        </div>
    </section>

    {{>footer}}
</body>
</html>
