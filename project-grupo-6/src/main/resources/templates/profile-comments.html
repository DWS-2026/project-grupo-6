<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Reviews - Crossfire Shop</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="apple-touch-icon" href="/css/img/apple-icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="/css/img/favicon.ico">

    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/templatemo.css">
    <link rel="stylesheet" href="/css/custom.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap">
    <link rel="stylesheet" href="/css/fontawesome.min.css">
</head>

<body class="d-flex flex-column min-vh-100">
    {{>header}}

    <section class="container py-5 flex-grow-1">
        <div class="row">
            {{>sidebar}}

            <main class="col-12 col-md-8">
                <div class="row">
                    {{#comments}}
                    <div class="col-12">
                        <div class="card mb-3 rounded-0 shadow-sm border-secondary">
                            <div class="row g-0 align-items-center">
                                
                                <div class="col-md-3 text-center p-3">
                                    <a href="/shop-single/{{product.id}}">
                                        <img src="{{product.mainImage}}" 
                                             class="img-fluid rounded" 
                                             alt="{{product.name}}"
                                             onerror="this.src='/css/img/default-product.png'">
                                    </a>
                                </div>

                                <div class="col-md-6 p-3">
                                    <h6 class="card-title mb-2">
                                        <a href="/shop-single/{{product.id}}" class="text-decoration-none text-success fw-bold">{{product.name}}</a>
                                    </h6>
                                    
                                    <form action="/user/comments/update/{{id}}" method="POST" id="update-form-{{id}}">
                                        <input type="hidden" name="_csrf" value="{{token}}"/>
                                        <textarea name="newContent" class="form-control" rows="3" required>{{content}}</textarea>
                                    </form>
                                    <small class="text-muted mt-1 d-block">Edit your text and click Update.</small>
                                </div>

                                <div class="col-md-3 p-3">
                                    <div class="d-flex flex-column gap-2">
                                        <button type="submit" form="update-form-{{id}}" class="btn btn-secondary btn-sm w-100">
                                            <i class="fas fa-save me-1"></i> Update
                                        </button>
                                        
                                        <form action="/user/comments/delete/{{id}}" method="POST" class="w-100">
                                            <input type="hidden" name="_csrf" value="{{token}}"/>
                                            <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                                                <i class="fas fa-trash me-1"></i> Delete
                                            </button>
                                        </form>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                    {{/comments}}
                    
                    {{^comments}}
                    <div class="col-12 text-center py-5">
                        <div class="alert alert-light border">
                            <i class="fas fa-comment-slash fa-3x text-muted mb-3"></i>
                            <p class="text-muted mb-0">You haven't written any reviews yet.</p>
                            <a href="/shop" class="btn btn-success mt-3">Explore Products</a>
                        </div>
                    </div>
                    {{/comments}}
                </div>
            </main>
        </div>
    </section>

    {{>footer}}    
</body>
</html>
