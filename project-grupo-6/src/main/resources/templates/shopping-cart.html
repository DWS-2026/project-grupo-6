<!DOCTYPE html>
<html lang="en">

<head>
    <title>Shopping Cart</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="apple-touch-icon" href="/css/img/apple-icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="/css/img/favicon.ico">

    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/templatemo.css">
    <link rel="stylesheet" href="/css/custom.css">

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap">
    <link rel="stylesheet" href="/css/fontawesome.min.css">
</head>

<body>

{{>header}}

<div class="container my-5">

    <h2 class="mb-4">
        Shopping Cart ({{totalItems}} items)
    </h2>

    <div class="row">

        <!-- ================= PRODUCT LIST ================= -->
        <div class="col-lg-8">
            <div class="card mb-3">
                <div class="card-body">

                    <!-- If cart has products -->
                    {{#cartItems}}
                    <div class="row align-items-center mb-3">

                        <div class="col-md-2">
                            <img src="{{product.imageUrl}}"
                                 class="img-fluid rounded"
                                 alt="Product">
                        </div>

                        <div class="col-md-4">
                            <h6 class="mb-1">{{product.name}}</h6>
                            <small class="text-muted">
                                {{product.description}}
                            </small>
                        </div>

                        <div class="col-md-2">
                            <form action="/cart/update/{{product.id}}" method="post">
                                <input type="number"
                                       name="quantity"
                                       class="form-control"
                                       value="{{quantity}}"
                                       min="1"
                                       onchange="this.form.submit()">
                            </form>
                        </div>

                        <div class="col-md-2">
                            <span class="fw-bold">
                                {{subtotal}} €
                            </span>
                        </div>

                        <div class="col-md-2 text-end">
                            <form action="/cart/remove/{{product.id}}" method="post">
                                <button class="btn btn-outline-danger btn-sm">
                                    Delete
                                </button>
                            </form>
                        </div>

                    </div>
                    <hr>
                    {{/cartItems}}

                    <!-- If cart is empty -->
                    {{^cartItems}}
                    <div class="text-center py-4">
                        <h5>Your cart is empty</h5>
                        <a href="/shop" class="btn btn-primary mt-3">
                            Continue shopping
                        </a>
                    </div>
                    {{/cartItems}}

                </div>
            </div>
        </div>

        <!-- ================= SUMMARY ================= -->
        <div class="col-lg-4">
            <div class="card">
                <div class="card-body">

                    <h5 class="card-title mb-3">Summary</h5>

                    <div class="d-flex justify-content-between">
                        <span>Items</span>
                        <span>{{totalItems}}</span>
                    </div>

                    <div class="d-flex justify-content-between">
                        <span>Subtotal</span>
                        <span>{{total}} €</span>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between fw-bold">
                        <span>Total</span>
                        <span>{{total}} €</span>
                    </div>

                    <form action="/cart/checkout" method="post">
                        <button class="btn btn-success w-100 mt-3">
                            Complete purchase
                        </button>
                    </form>


                </div>
            </div>
        </div>

    </div>
</div>

{{>footer}}

</body>
</html>
