<!DOCTYPE html>
<html lang="en">

<head>
    <title>Edit User - Admin Panel</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="apple-touch-icon" href="/css/img/apple-icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="/css/img/favicon.ico">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/templatemo.css">
    <link rel="stylesheet" href="/css/custom.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap">
    <link rel="stylesheet" href="/css/fontawesome.min.css">

    <style>
        .profile-photo { width: 160px; height: 160px; object-fit: cover; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: block; }
        .profile-photo-container { display: inline-flex; align-items: center; justify-content: center; }
        .profile-fallback { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, #59ab6e 0%, #3f8d6e 100%); display: none; align-items: center; justify-content: center; color: white; font-size: 52px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-shrink: 0; }
        .list-label { width: 140px; }
        
        /* Nuevo estilo para resaltar que estamos en modo edición */
        .admin-edit-card { border: 2px solid #0d6efd; box-shadow: 0 0 15px rgba(13, 110, 253, 0.1); }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    {{>header}}

    <section class="container py-5 flex-grow-1">
        <div class="row">
            {{>sidebar}}

            <main class="col-12 col-md-8">
                <div class="alert alert-primary d-flex align-items-center mb-4" role="alert">
                    <i class="fas fa-tools fa-2x me-3"></i>
                    <div>
                        <h5 class="alert-heading mb-0">Admin Mode</h5>
                        <span>You are modifying the profile of <strong>{{user.username}}</strong>. Any changes will be applied directly to their account.</span>
                    </div>
                </div>

                <div class="card admin-edit-card">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <div class="profile-photo-container">
                                <img src="/user/{{user.id}}/image" alt="Profile Photo" class="profile-photo" id="profile-img" onerror="this.style.display='none';document.querySelector('.profile-fallback').style.display='flex'">
                            </div>
                        </div>
                        
                        <form action="/admin/user/edit/{{user.id}}" method="POST">
                            <div class="card mb-3 border-0">
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0">
                                        <span class="list-label text-muted">First Name</span>
                                        <input type="text" name="firstname" class="form-control" value="{{user.firstname}}" required>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0">
                                        <span class="list-label text-muted">Last Name</span>
                                        <input type="text" name="lastname" class="form-control" value="{{user.lastname}}" required>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0">
                                        <span class="list-label text-muted">Username</span>
                                        <input type="text" name="username" class="form-control" value="{{user.username}}" required>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0">
                                        <span class="list-label text-muted">Email</span>
                                        <input type="email" name="email" class="form-control" value="{{user.email}}" required>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0">
                                        <span class="list-label text-muted">Rol</span>
                                        <select name="rol" class="form-select">
                                            <option value="Admin">Admin</option>
                                            <option value="User">User</option>
                                        </select>
                                    </li>
                                </ul>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <a href="/admin/users" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i> Save Changes
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
            </main>
        </div>
    </section>

    {{>footer}}
</body>
</html>
