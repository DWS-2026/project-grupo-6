<aside class="col-12 col-md-4 mb-4">
    <div class="card mb-4 mt-3">
        <div class="card-body">
            <h5 class="card-title">Account</h5>
            <div class="list-group list-group-flush">
                <a href="/user/profile" class="list-group-item list-group-item-action d-flex align-items-center">
                    <i class="fas fa-user me-3"></i>
                    <span>Profile</span>
                </a>
                <a href="/user/orders" class="list-group-item list-group-item-action d-flex align-items-center">
                    <i class="fas fa-history me-3"></i>
                    <span>Purchase History</span>
                </a>
                <a href="/user/update" class="list-group-item list-group-item-action d-flex align-items-center">
                    <i class="fas fa-user-cog me-3"></i>
                    <span>Change Data</span>
                </a>
                <a href="/user/comments" class="list-group-item list-group-item-action d-flex align-items-center">
                    <i class="fas fa-comments me-3"></i>
                    <span>My Reviews</span>
                </a>
            </div>
        </div>
    </div>

    {{#isAdmin}}
        <div class="card mb-4 mt-3 border-primary"> <div class="card-body">
                <h5 class="card-title text-primary">
                    <i class="fas fa-shield-alt me-2"></i>Admin Panel
                </h5>
                <div class="list-group list-group-flush">
                    <a href="/admin/users" class="list-group-item list-group-item-action d-flex align-items-center">
                        <i class="fas fa-users me-3 text-primary"></i>
                        <span>Users List</span>
                    </a>
                    <a href="/admin/products" class="list-group-item list-group-item-action d-flex align-items-center">
                        <i class="fas fa-box-open me-3 text-primary"></i>
                        <span>Products Management</span>
                    </a>
                </div>
            </div>
        </div>
        {{/isAdmin}}

    <div class="d-grid gap-3">
        <form action="/user/delete" method="post" class="w-100">
            <button type="submit" class="btn btn-outline-danger btn-lg w-100">
                <i class="fas fa-user-times me-2"></i>Delete profile
            </button>
        </form>
        
        <a href="/user/logout" class="btn btn-outline-danger btn-lg">
            <i class="fas fa-sign-out-alt me-2"></i>Log out
        </a>
    </div>
</aside>
