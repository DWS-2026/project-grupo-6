<!DOCTYPE html>
<html lang="en">
<head>
  <title>Crossfire Shop Header HTML CSS Template</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="apple-touch-icon" href="/css/img/apple-icon.png">
  <link rel="shortcut icon" type="image/x-icon" href="/css/img/favicon.ico">

  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/templatemo.css">
  <link rel="stylesheet" href="/css/custom.css">

  <!-- Load fonts style after rendering the layout styles -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap">
  <link rel="stylesheet" href="/css/fontawesome.min.css">

  <!-- Quill -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.0-rc.2/dist/quill.snow.css" rel="stylesheet" />
</head>

<body>
  <!-- Header -->
  <nav class="navbar navbar-expand-lg navbar-light shadow">
    <div class="container d-flex justify-content-between align-items-center">

      <a class="navbar-brand text-success logo h1 align-self-center" href="/">
        Crossfire
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#templatemo_main_nav" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="align-self-center collapse navbar-collapse flex-fill  d-lg-flex justify-content-lg-between" id="templatemo_main_nav">
        <div class="flex-fill">
          <ul class="nav navbar-nav d-flex justify-content-between mx-lg-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shop">Shop</a>
            </li>
          </ul>
        </div>

        <div class="navbar align-self-center d-flex">
        {{#cartCount}}
        <a class="nav-icon position-relative text-decoration-none" href="/cart">
          <i class="fa fa-fw fa-cart-arrow-down text-dark mr-1"></i>
          <span class="position-absolute top-0 left-100 translate-middle badge rounded-pill bg-light text-dark">
            {{cartCount}}
          </span>
        </a>
        {{/cartCount}}
        {{^cartCount}}
        <a class="nav-icon position-relative text-decoration-none" href="/cart">
          <i class="fa fa-fw fa-cart-arrow-down text-dark mr-1"></i>
          <span class="position-absolute top-0 left-100 translate-middle badge rounded-pill bg-light text-dark">
            0
          </span>
        </a>
        {{/cartCount}}

        {{#loggedUser}}
          <div class="nav-item dropdown">
            <a class="nav-icon position-relative text-decoration-none dropdown-toggle" href="#" id="userMenu" data-bs-toggle="dropdown">
              <i class="fa fa-fw fa-user text-success mr-3"></i>
              <span class="text-dark">{{username}}</span> </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
              <li><a class="dropdown-item" href="/user/profile">Mi Perfil</a></li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <form action="/user/logout" method="post" class="m-0">
                  <input type="hidden" name="_csrf" value="{{token}}"/>
                  <button type="submit" class="dropdown-item text-danger border-0 bg-transparent w-100 text-start">
                    Cerrar Sesión
                  </button>
                </form>
              </li>
            </ul>
          </div>
        {{/loggedUser}}

        {{^loggedUser}}
          <a class="nav-icon position-relative text-decoration-none" href="/login" title="Iniciar sesión">
            <i class="fa fa-fw fa-user text-dark mr-3"></i>
            <small class="text-dark">Login</small>
          </a>
        {{/loggedUser}}

      </div>
      
      </div>

    </div>
  </nav>
  <!-- Close Header -->

  <!-- Start Script -->
  <script src="/css/js/jquery-1.11.0.min.js"></script>
  <script src="/css/js/jquery-migrate-1.2.1.min.js"></script>
  <script src="/css/js/bootstrap.bundle.min.js"></script>
  <script src="/css/js/templatemo.js"></script>
  <script src="/css/js/custom.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const userMenu = document.getElementById('userMenu');
      if (userMenu) {
        // Force initializer
        const dropdown = bootstrap.Dropdown.getOrCreateInstance(userMenu);

        // Option: make sure it toggles when click
        userMenu.addEventListener('click', function(e) {
          e.preventDefault();
          dropdown.toggle();
        });
      }
    });
  </script>
  <!-- End Script -->
</body>
</html>
