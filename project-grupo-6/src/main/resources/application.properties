spring.application.name=project-grupo-6
spring.mustache.suffix=.html
logging.level.org.springframework.web=DEBUG
logging.level.com.samskivert.mustache=DEBUG
logging.level.org.springframework.web.servlet.view.MustacheView=DEBUG

# ===============================
# CONFIG MySQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/crossfire_db?serverTimezone=UTC
spring.datasource.username=user
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIG HIBERNATE (JPA)
# ===============================
# Esto hace que Spring Boot cree las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true



